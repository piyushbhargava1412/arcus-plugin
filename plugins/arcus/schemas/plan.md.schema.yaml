# plan.md section-ownership manifest (ARCUS substrate contract).
# The shared deliberation record `plan.md` is co-authored by two capabilities.
# Each writes ONLY its owned sections; a validator confirms no clobbering.
# spec-finalizer runs first and creates the file; implementation-planner appends its design sections.

file: plan.md
description: Shared story deliberation record, co-owned by spec-finalizer and implementation-planner.

sections:
  - heading: "# Plan: <STORY-ID>"
    owner: spec-finalizer
    required: true
    note: spec-finalizer creates the file with this title.

  - heading: "## Context Grounding"
    owner: spec-finalizer
    required: true

  - heading: "## Resolved Ambiguities"
    owner: spec-finalizer
    required: true

  - heading: "## Dialogue Answers"
    owner: spec-finalizer
    required: false
    note: Appears only in dialogue mode.

  - heading: "## Implementation Boundary"
    owner: spec-finalizer
    required: true

  - heading: "## Guardrail Check"
    owner: spec-finalizer
    required: true

  - heading: "## Approach Evaluation"
    owner: implementation-planner
    required: true

  - heading: "## Chosen Approach & Reasoning"
    owner: implementation-planner
    required: true

  - heading: "## Design / Impacted Files"
    owner: implementation-planner
    required: true

  - heading: "## Design Dialogue Answers"
    owner: implementation-planner
    required: false
    note: Appears only in dialogue mode.

rules:
  - Each skill writes or replaces ONLY the sections it owns; it must never overwrite sections owned by the other skill.
  - spec-finalizer creates plan.md if absent; implementation-planner appends to the existing file.
  - Optional sections (Dialogue Answers, Design Dialogue Answers) appear only in dialogue mode.
